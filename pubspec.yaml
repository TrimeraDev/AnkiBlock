name: ankiblock
description: An Anki-compatible flashcard app with app blocking study gates
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # State & navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Database
  drift: ^2.20.2
  sqlite3_flutter_libs: ^0.5.24

  # Storage & file
  path_provider: ^2.1.4
  path: ^1.9.0
  shared_preferences: ^2.3.2

  # Platform
  permission_handler: ^11.3.1

  # Utils
  intl: ^0.19.0
  url_launcher: ^6.3.2
  in_app_review: ^2.0.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.20.2

flutter:
  uses-material-design: true
  assets:
    - lib/src/assets/logo_transparent.png
